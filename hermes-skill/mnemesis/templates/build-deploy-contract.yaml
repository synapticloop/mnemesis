schema_version: 1
project:
  name: <project-slug>
  description: One-sentence summary of what this project does.
    Choose words the user is likely to type when looking for it.
inputs:
  - name: <input-name>
    description: What starting state this input represents.
    type: directory
    outputs:
      - name: <artifact-name>
        description: Optional. What this artifact is.
        type: file
        location: ./relative/path/from/input/root
    actions:
      - type: successful-build
        instructions: Build produced <artifact-name>; one sentence describing what changed and any project-specific invariant the next agent wouldn't infer.
      - type: successful-test
        instructions: All tests pass; one sentence describing the test scope or any test-specific gotcha (e.g. integration tests need a live database).
      - type: successful-publish
        instructions: Output reached its destination; one sentence on how to confirm the publish landed (commit SHA, deployed URL, registry entry, etc.).
      - type: failed-build
        instructions: Report the error verbatim with file and line; do not retry without user direction.
